ExperienceItem:
  type: object
  required:
    - id
    - company
    - role
    - location
    - startDate
    - endDate
    - current
    - summary
    - highlights
  properties:
    id:
      type: string
      maxLength: 128
    company:
      type: string
      maxLength: 160
    role:
      type: string
      maxLength: 160
    location:
      type: string
      maxLength: 120
    startDate:
      type: string
    endDate:
      type: string
    current:
      type: boolean
    summary:
      type: string
      maxLength: 5000
    highlights:
      type: array
      maxItems: 50
      items:
        type: string
        maxLength: 400
