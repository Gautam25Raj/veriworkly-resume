services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8080/api/v1}
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8080/api/v1}
      BACKEND_INTERNAL_URL: http://api:8080/api/v1
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Neon Postgres connection string}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:8080}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GITHUB_SYNC_ENABLED: ${GITHUB_SYNC_ENABLED:-false}
      INTERNAL_SYNC_API_KEY: ${INTERNAL_SYNC_API_KEY:-}
      AUTH_SESSION_TTL_SECONDS: ${AUTH_SESSION_TTL_SECONDS:-2592000}
      AUTH_MAGIC_LINK_TTL_SECONDS: ${AUTH_MAGIC_LINK_TTL_SECONDS:-600}
      AUTH_MAGIC_LINK_ALLOWED_ATTEMPTS: ${AUTH_MAGIC_LINK_ALLOWED_ATTEMPTS:-3}
      AUTH_EMAIL_PROVIDER: ${AUTH_EMAIL_PROVIDER:-console}
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:-}
      AUTH_SMTP_HOST: ${AUTH_SMTP_HOST:-}
      AUTH_SMTP_PORT: ${AUTH_SMTP_PORT:-587}
      AUTH_SMTP_SECURE: ${AUTH_SMTP_SECURE:-false}
      AUTH_SMTP_USER: ${AUTH_SMTP_USER:-}
      AUTH_SMTP_PASS: ${AUTH_SMTP_PASS:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      GITHUB_PROJECT_URL: ${GITHUB_PROJECT_URL:-}
      GITHUB_SYNC_CRON: ${GITHUB_SYNC_CRON:-0 0,12 * * *}
      GITHUB_SYNC_TIMEZONE: ${GITHUB_SYNC_TIMEZONE:-UTC}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      USAGE_METRICS_FLUSH_CRON: ${USAGE_METRICS_FLUSH_CRON:-10 0 * * *}
      USAGE_METRICS_FLUSH_TIMEZONE: ${USAGE_METRICS_FLUSH_TIMEZONE:-UTC}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
