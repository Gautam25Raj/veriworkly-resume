MasterProfileBasics:
  type: object
  required:
    - fullName
    - role
    - headline
    - email
    - phone
    - location
    - linkEmail
    - linkPhone
    - linkLocation
  properties:
    fullName:
      type: string
      maxLength: 120
    role:
      type: string
      maxLength: 120
    headline:
      type: string
      maxLength: 250
    email:
      type: string
      format: email
    phone:
      type: string
      maxLength: 40
    location:
      type: string
      maxLength: 120
    linkEmail:
      type: boolean
    linkPhone:
      type: boolean
    linkLocation:
      type: boolean
