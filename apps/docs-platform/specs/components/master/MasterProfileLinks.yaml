MasterProfileLinks:
  type: object
  required:
    - displayMode
    - items
  properties:
    displayMode:
      type: string
      enum: ["icon", "url", "icon-username"]
    items:
      type: array
      maxItems: 50
      items:
        type: object
        required:
          - id
          - type
          - label
          - url
        properties:
          id:
            type: string
            maxLength: 128
          type:
            type: string
            enum:
              - github
              - linkedin
              - dribbble
              - twitter
              - portfolio
              - behance
              - medium
              - youtube
              - custom
          label:
            type: string
            maxLength: 80
          url:
            type: string
            format: uri
