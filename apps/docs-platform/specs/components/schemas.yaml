##################################################
# ROADMAP SCHEMA
##################################################

RoadmapFeature:
  type: object
  required:
    - id
    - title
    - description
    - status
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
    title:
      type: string
    description:
      type: string
    status:
      type: string
      enum: [todo, in-progress, done]
    eta:
      type: string
      nullable: true
    tags:
      type: array
      items:
        type: string
    createdAt:
      type: string
      format: date-time
    startedAt:
      type: string
      format: date-time
      nullable: true
    completedAt:
      type: string
      format: date-time
      nullable: true
    completedQuarter:
      type: string
      nullable: true
    updatedAt:
      type: string
      format: date-time
    timeline:
      type: string
      nullable: true

RoadmapListData:
  type: object
  required:
    - items
    - total
    - limit
    - offset
    - hasMore
    - pagination
  properties:
    items:
      type: array
      items:
        $ref: "#/RoadmapFeature"
    total:
      type: integer
    limit:
      type: integer
    offset:
      type: integer
    hasMore:
      type: boolean
    pagination:
      type: object
      properties:
        mode:
          type: string
          enum: [offset]
        nextOffset:
          type: integer
          nullable: true
        nextCursor:
          type: string
          nullable: true

RoadmapListResponse:
  type: object
  required: [success, message, data]
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      $ref: "#/RoadmapListData"

RoadmapStats:
  type: object
  properties:
    totalFeatures:
      type: integer
    todo:
      type: integer
    inProgress:
      type: integer
    done:
      type: integer
    completionRate:
      type: string

RoadmapStatsResponse:
  type: object
  required: [success, message, data]
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      $ref: "#/RoadmapStats"

RoadmapFeatureDetail:
  allOf:
    - $ref: "#/RoadmapFeature"
    - type: object
      properties:
        fullDescription:
          type: string
          nullable: true
        whyItMatters:
          type: string
          nullable: true
        details:
          type: object
          nullable: true
        interactions:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              value:
                type: integer
              comment:
                type: string
                nullable: true
              createdAt:
                type: string
                format: date-time
              user:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                    nullable: true

RoadmapFeatureResponse:
  type: object
  required: [success, message, data]
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      $ref: "#/RoadmapFeatureDetail"

##################################################
# GITHUB SCHEMA
##################################################

GitHubStats:
  type: object
  properties:
    total:
      type: integer
    todo:
      type: integer
    inProgress:
      type: integer
    done:
      type: integer
    completionRate:
      type: string

GitHubStatsData:
  type: object
  properties:
    projectName:
      type: string
    stats:
      $ref: "#/GitHubStats"
    syncedAt:
      type: string
      format: date-time

GitHubStatsResponse:
  type: object
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      - $ref: "#/GitHubStatsData"
      - type: "null"

GitHubItem:
  type: object
  properties:
    id:
      type: string
    number:
      type: integer
    title:
      type: string
    status:
      type: string
      enum: [todo, in-progress, done]
    kind:
      type: string
      enum: [issue, pull-request]
    url:
      type: string
    labels:
      type: array
      items:
        type: string
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

GitHubIssuesData:
  type: object
  properties:
    items:
      type: array
      items:
        $ref: "#/GitHubItem"
    total:
      type: integer
    limit:
      type: integer
    offset:
      type: integer

GitHubIssuesResponse:
  type: object
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      $ref: "#/GitHubIssuesData"

GenericSuccessResponse:
  type: object
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      type: object
      additionalProperties: true

##################################################
# GITHUB SCHEMA
##################################################
