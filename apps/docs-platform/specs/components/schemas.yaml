ErrorResponse:
  type: object
  required:
    - success
    - message
    - statusCode
  properties:
    success:
      type: boolean
    message:
      type: string
    statusCode:
      type: integer
    details:
      type: array
      nullable: true
      items:
        type: object
        properties:
          path:
            type: string
          message:
            type: string

##################################################
# HEALTH SCHEMA
##################################################

HealthData:
  type: object
  required:
    - status
    - database
    - redis
    - timestamp
  properties:
    status:
      type: string
      example: ok
    database:
      type: string
      example: connected
    redis:
      type: string
      example: connected
    timestamp:
      type: string
      format: date-time

HealthResponse:
  type: object
  required:
    - success
    - message
    - data
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      $ref: "#/HealthData"

##################################################
# USER SCHEMA
##################################################

UserObject:
  type: object
  required:
    - id
    - email
    - emailVerified
    - autoSyncEnabled
    - createdAt
    - updatedAt
    - _count
  properties:
    id:
      type: string
    name:
      type: string
      nullable: true
    email:
      type: string
    emailVerified:
      type: boolean
    autoSyncEnabled:
      type: boolean
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    _count:
      type: object
      required:
        - resumeShareLinks
        - resumes
      properties:
        resumeShareLinks:
          type: integer
        resumes:
          type: integer

UserResponse:
  type: object
  required:
    - success
    - message
    - data
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      $ref: "#/UserObject"

